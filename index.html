<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class-Based Repository</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="icon.ico">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="top-bar">
            <div class="logo">
                <a href="Ru.HTML">RuArchive</a>
            </div>
            <div class="header-right">
                <div class="archive-note">2026</div>
                <button class="search-btn" onclick="location.href='About.HTML'">About</button>
                <button class="search-btn" onclick="location.href='New.HTML'">+</button>
            </div>
        </header>

        <!-- SEARCH SECTION -->
        <section class="search-panel">
            <form id="searchForm" onsubmit="event.preventDefault(); window.applyFiltersAndRender();">
                <div class="search-line">
                    <input type="text" id="searchBox" placeholder="Search repositories by name or description..." autocomplete="off">
                    <button type="submit" class="search-btn">SEARCH</button>
                </div>
            </form>
        </section>

        <!-- CATEGORY BUTTONS: ALL, SOFT, VIDEO, BOOKS, JAR -->
        <div class="category-row">
            <button class="cat-btn all-btn" data-cat="all" style="display: none;">All</button>
            <button class="cat-btn" data-cat="soft">Soft</button>
            <button class="cat-btn" data-cat="video">Video</button>
            <button class="cat-btn" data-cat="books">Books</button>
            <button class="cat-btn" data-cat="jar">Jar</button>
            <button class="cat-btn" data-cat="aud">audio</button>
            <button class="cat-btn" data-cat="img">images</button>
        </div>

        <!-- REPOSITORIES SECTION -->
        <h2 class="section-title">AVAILABLE COLLECTIONS</h2>
        <div id="repositoriesContainer" class="repo-grid">
            <!-- repositories will be inserted via JS -->
        </div>

        <!-- FOOTER -->
        <footer class="footer-note">
            < repositories defined as HTML classes | materials stored in root folder | category by file extension
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

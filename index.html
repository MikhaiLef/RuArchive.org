<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class-Based Repository</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="top-bar">
            <div class="logo">
                <a href="/">RuArchive</a>
            </div>
            <div class="header-right">
                <div class="archive-note">2026</div>
                <button class="about-btn" onclick="location.href='About.HTML'">About</button>
            </div>
        </header>

        <!-- FAVICON (ICON.ICO) -->
        <link rel="icon" type="image/x-icon" href="icon.ico">
        <link rel="shortcut icon" type="image/x-icon" href="icon.ico">

        <!-- SEARCH SECTION -->
        <section class="search-panel">
            <form id="searchForm" onsubmit="event.preventDefault(); window.filterRepos();">
                <div class="search-line">
                    <input type="text" id="searchBox" placeholder="Search repositories by name or description..." autocomplete="off">
                    <button type="submit" class="search-btn">SEARCH</button>
                </div>
            </form>
        </section>

        <!-- REPOSITORIES SECTION -->
        <h2 class="section-title">AVAILABLE COLLECTIONS</h2>
        <div id="repositoriesContainer" class="repo-grid">
            <!-- repositories will be inserted via JS -->
        </div>

        <!-- FOOTER -->
        <footer class="footer-note">
            < repositories defined as HTML classes | materials stored in root folder
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
